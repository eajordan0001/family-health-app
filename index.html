<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 家人健康照護+影像版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #059669 !important; }
        .day-cell { min-height: 60px; }
        #previewImg { max-height: 100px; display: none; margin: 10px auto; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans text-slate-900">

    <header class="bg-white border-b p-4 sticky top-0 z-40 flex justify-between items-center">
        <h1 id="pageTitle" class="text-lg font-black tracking-tight underline decoration-emerald-500 decoration-4">健康紀錄</h1>
        <div class="flex items-center bg-slate-100 rounded-lg px-2">
            <input type="month" id="globalMonth" onchange="updateAllViews()" class="bg-transparent border-none text-xs font-bold p-1">
        </div>
    </header>

    <main id="recordPage" class="p-4 space-y-4 max-w-xl mx-auto">
        <div id="memberTabs" class="flex space-x-2 overflow-x-auto pb-2 no-scrollbar"></div>

        <div class="bg-white rounded-3xl shadow-sm p-6 border border-slate-100">
            <div class="flex bg-slate-50 rounded-xl p-1 mb-4">
                <button onclick="switchType('bp')" id="bpBtn" class="flex-1 py-1.5 text-xs rounded-lg bg-white shadow-sm font-bold text-emerald-600">血壓/心跳</button>
                <button onclick="switchType('bs')" id="bsBtn" class="flex-1 py-1.5 text-xs rounded-lg text-slate-400">血糖</button>
            </div>

            <div id="bpInput" class="grid grid-cols-3 gap-2 mb-4">
                <input type="number" id="sys" placeholder="高壓" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold">
                <input type="number" id="dia" placeholder="低壓" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold">
                <input type="number" id="pulse" placeholder="心跳" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold">
            </div>

            <div id="bsInput" class="hidden grid grid-cols-2 gap-2 mb-4">
                <input type="number" id="glucose" placeholder="血糖值" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold">
                <select id="bsPeriod" class="bg-slate-50 p-3 rounded-xl text-xs font-bold border-none">
                    <option value="空腹">空腹</option><option value="飯後2hr">飯後2hr</option>
                </select>
            </div>

            <div class="mb-4 border-2 border-dashed border-slate-100 rounded-2xl p-3 text-center">
                <input type="file" id="photoInput" accept="image/*" capture="camera" class="hidden" onchange="handleFileSelect(event)">
                <button onclick="document.getElementById('photoInput').click()" class="text-slate-400 text-xs py-2 px-4 rounded-lg hover:bg-slate-50">
                    <i class="fas fa-camera mr-1"></i> 拍照或上傳儀器畫面
                </button>
                <img id="previewImg" src="" alt="預覽">
            </div>

            <button onclick="saveData()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-100 active:scale-95 transition">儲存 <span id="targetDate">今日</span> 紀錄</button>
        </div>

        <section class="bg-white rounded-3xl shadow-sm p-4 border border-slate-100">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-2">點擊日期查看紀錄與照片</h3>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-sm text-center"></div>
        </section>
    </main>

    <main id="trendPage" class="hidden p-4 space-y-4 max-w-xl mx-auto">
        <canvas id="bpChart" class="bg-white rounded-3xl p-4 shadow-sm"></canvas>
        <canvas id="bsChart" class="bg-white rounded-3xl p-4 shadow-sm mt-4"></canvas>
    </main>

    <main id="settingsPage" class="hidden p-4 space-y-4 max-w-xl mx-auto">
        <div id="memberList" class="space-y-2"></div>
        <button onclick="sendToLine()" class="w-full py-4 bg-[#06C755] text-white rounded-2xl font-bold">LINE 傳送報表</button>
        <button onclick="backupJSON()" class="w-full py-2 text-slate-400 text-xs">下載數據備份</button>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-t-[2rem] sm:rounded-[2rem] p-6 max-h-[85vh] overflow-y-auto">
            <div id="modalContent" class="space-y-4"></div>
            <button onclick="closeModal()" class="w-full mt-4 py-3 text-slate-400 font-bold">關閉</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around py-3 z-40">
        <button onclick="nav('record')" id="nav-record" class="flex flex-col items-center text-slate-300 active-tab"><i class="fas fa-edit"></i><span class="text-[10px] mt-1">紀錄</span></button>
        <button onclick="nav('trend')" id="nav-trend" class="flex flex-col items-center text-slate-300"><i class="fas fa-chart-line"></i><span class="text-[10px] mt-1">趨勢</span></button>
        <button onclick="nav('settings')" id="nav-settings" class="flex flex-col items-center text-slate-300"><i class="fas fa-users"></i><span class="text-[10px] mt-1">管理</span></button>
    </nav>

    <script>
        let members = JSON.parse(localStorage.getItem('health_members_v4') || '["爸爸", "媽媽"]');
        let currentMember = members[0];
        let activeDate = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('health_db_v4') || '{}');
        let currentType = 'bp';
        let currentBase64 = null;

        function init() {
            document.getElementById('globalMonth').value = activeDate.substring(0, 7);
            updateAllViews();
        }

        // 處理照片選取與壓縮
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 圖片壓縮邏輯
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; // 限制寬度在 400px 以內節省空間
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.7); // 壓縮品質 0.7
                    const preview = document.getElementById('previewImg');
                    preview.src = currentBase64;
                    preview.style.display = 'block';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            const time = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
            let entry = { time, type: currentType, date: activeDate, photo: currentBase64 };
            
            if(currentType === 'bp') {
                entry.sys = document.getElementById('sys').value;
                entry.dia = document.getElementById('dia').value;
                entry.pulse = document.getElementById('pulse').value;
                if(!entry.sys) return alert("請輸入數值");
            } else {
                entry.glucose = document.getElementById('glucose').value;
                entry.period = document.getElementById('bsPeriod').value;
                if(!entry.glucose) return alert("請輸入數值");
            }

            const monthKey = activeDate.substring(0, 7);
            if(!db[monthKey]) db[monthKey] = {};
            if(!db[monthKey][currentMember]) db[monthKey][currentMember] = [];
            
            db[monthKey][currentMember].push(entry);
            
            try {
                localStorage.setItem('health_db_v4', JSON.stringify(db));
                alert("✅ 儲存成功");
                // 重置
                currentBase64 = null;
                document.getElementById('previewImg').style.display = 'none';
                updateAllViews();
            } catch (e) {
                alert("儲存失敗：空間已滿，請刪除舊紀錄或照片再試。");
            }
        }

        function openModal(date) {
            const monthKey = date.substring(0, 7);
            const data = db[monthKey][currentMember].filter(r => r.date === date);
            document.getElementById('modalContent').innerHTML = data.map((r, idx) => `
                <div class="p-4 rounded-2xl border border-slate-100 bg-white">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-400">${r.time}</span>
                        <span class="text-[10px] font-black bg-slate-50 px-2 py-0.5 rounded-full">${r.type==='bp'?'血壓':'血糖'}</span>
                    </div>
                    <div class="text-lg font-bold mb-2">
                        ${r.type==='bp' ? `血壓 ${r.sys}/${r.dia} · 心跳 ${r.pulse}` : `血糖 ${r.glucose} (${r.period})`}
                    </div>
                    ${r.photo ? `<img src="${r.photo}" class="w-full rounded-xl mb-2 shadow-sm">` : ''}
                    <button onclick="deleteRecord('${date}', ${idx})" class="text-[10px] text-red-300">刪除紀錄</button>
                </div>
            `).join('');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        // --- 以下為原有核心邏輯 (簡化版呈現，請確保與原代碼一致) ---
        function nav(page) {
            ['record', 'trend', 'settings'].forEach(p => {
                document.getElementById(p + 'Page').classList.add('hidden');
                document.getElementById('nav-' + p).classList.remove('active-tab');
            });
            document.getElementById(page + 'Page').classList.remove('hidden');
            document.getElementById('nav-' + page).classList.add('active-tab');
        }
        function switchType(type) {
            currentType = type;
            document.getElementById('bpInput').classList.toggle('hidden', type !== 'bp');
            document.getElementById('bsInput').classList.toggle('hidden', type !== 'bs');
        }
        function selectDate(date, hasData) {
            activeDate = date;
            renderCalendar();
            if(hasData) openModal(date);
        }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function renderCalendar() {
            const monthVal = document.getElementById('globalMonth').value;
            const container = document.getElementById('calendarGrid');
            container.innerHTML = '';
            const monthData = (db[monthVal] && db[monthVal][currentMember]) ? db[monthVal][currentMember] : [];
            for(let d=1; d<=31; d++) { // 簡化展示
                const fullDate = `${monthVal}-${String(d).padStart(2, '0')}`;
                const entries = monthData.filter(r => r.date === fullDate);
                if(d > new Date(monthVal.split('-')[0], monthVal.split('-')[1], 0).getDate()) break;
                container.innerHTML += `
                    <div onclick="selectDate('${fullDate}', ${entries.length > 0})" class="p-2 rounded-xl ${fullDate === activeDate ? 'bg-emerald-500 text-white' : ''}">
                        ${d}
                        ${entries.length > 0 ? `<div class="w-1 h-1 bg-current rounded-full mx-auto"></div>` : ''}
                    </div>`;
            }
        }
        function updateAllViews() { renderMemberTabs(); renderCalendar(); }
        function renderMemberTabs() {
            document.getElementById('memberTabs').innerHTML = members.map(m => `
                <button onclick="currentMember='${m}';updateAllViews()" class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-bold ${currentMember === m ? 'bg-slate-800 text-white' : 'bg-white text-slate-400'}">${m}</button>
            `).join('');
        }
        // --- 啟動 ---
        init();
    </script>
</body>
</html>
