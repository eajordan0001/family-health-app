<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 家人健康照護</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #059669 !important; }
        .day-cell { min-height: 60px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">

    <header class="bg-white border-b p-4 sticky top-0 z-40 flex justify-between items-center">
        <h1 id="pageTitle" class="text-lg font-black text-slate-800 tracking-tight underline decoration-emerald-500 decoration-4">健康紀錄</h1>
        <div class="flex items-center bg-slate-100 rounded-lg px-2">
            <input type="month" id="globalMonth" onchange="updateAllViews()" class="bg-transparent border-none text-xs font-bold p-1">
        </div>
    </header>

    <main id="recordPage" class="p-4 space-y-4 max-w-xl mx-auto">
        <div id="memberTabs" class="flex space-x-2 overflow-x-auto pb-2 no-scrollbar"></div>

        <div class="bg-white rounded-3xl shadow-sm p-6 border border-slate-100">
            <div class="flex bg-slate-50 rounded-xl p-1 mb-4">
                <button onclick="switchType('bp')" id="bpBtn" class="flex-1 py-1.5 text-xs rounded-lg bg-white shadow-sm font-bold text-emerald-600">血壓/心跳</button>
                <button onclick="switchType('bs')" id="bsBtn" class="flex-1 py-1.5 text-xs rounded-lg text-slate-400">血糖</button>
            </div>

            <div id="bpInput" class="grid grid-cols-3 gap-2 mb-4">
                <input type="number" id="sys" placeholder="高壓" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold focus:ring-2 focus:ring-emerald-500">
                <input type="number" id="dia" placeholder="低壓" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold focus:ring-2 focus:ring-emerald-500">
                <input type="number" id="pulse" placeholder="心跳" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold focus:ring-2 focus:ring-emerald-500">
            </div>

            <div id="bsInput" class="hidden grid grid-cols-2 gap-2 mb-4">
                <input type="number" id="glucose" placeholder="血糖值" inputmode="numeric" class="bg-slate-50 p-3 rounded-xl w-full text-center font-bold">
                <select id="bsPeriod" class="bg-slate-50 p-3 rounded-xl text-xs font-bold border-none">
                    <option value="空腹">空腹</option>
                    <option value="飯後2hr">飯後2hr</option>
                </select>
            </div>

            <button onclick="saveData()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-100 active:scale-95 transition">儲存 <span id="targetDate">今日</span> 紀錄</button>
        </div>

        <section class="bg-white rounded-3xl shadow-sm p-4 border border-slate-100">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-2">點擊日期查看紀錄與 AI 分析</h3>
            <div class="grid grid-cols-7 text-center text-[10px] font-bold text-slate-300 mb-2">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-sm text-center"></div>
        </section>
    </main>

    <main id="trendPage" class="hidden p-4 space-y-4 max-w-xl mx-auto">
        <section class="bg-white rounded-3xl shadow-sm p-6 border border-slate-100">
            <h3 class="text-sm font-bold text-slate-700 mb-4">收縮壓趨勢 (mmHg)</h3>
            <canvas id="bpChart" height="200"></canvas>
        </section>
        <section class="bg-white rounded-3xl shadow-sm p-6 border border-slate-100">
            <h3 class="text-sm font-bold text-slate-700 mb-4">血糖趨勢 (mg/dL)</h3>
            <canvas id="bsChart" height="200"></canvas>
        </section>
    </main>

    <main id="settingsPage" class="hidden p-4 space-y-4 max-w-xl mx-auto">
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="font-bold mb-4">成員管理</h3>
            <div id="memberList" class="space-y-2 mb-4"></div>
            <div class="flex gap-2">
                <input type="text" id="newMemberName" placeholder="新增名稱" class="flex-1 bg-slate-50 rounded-xl px-4 py-2 text-sm border-none">
                <button onclick="addMember()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm">新增</button>
            </div>
        </section>

        <section class="space-y-2">
            <button onclick="sendToLine()" class="w-full py-4 bg-[#06C755] text-white rounded-2xl font-bold flex items-center justify-center shadow-lg">
                <i class="fab fa-line mr-2 text-xl"></i> 傳送本月報表至 LINE
            </button>
            <button onclick="exportCSV()" class="w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-600 flex items-center justify-center">
                <i class="fas fa-file-csv mr-2 text-emerald-500"></i> 匯出 CSV 檔案
            </button>
            <button onclick="backupJSON()" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold flex items-center justify-center">
                <i class="fas fa-file-code mr-2"></i> 下載備份 (JSON)
            </button>
        </section>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-t-[2rem] sm:rounded-[2rem] p-6 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modalDate" class="font-black text-slate-800">日期紀錄</h3>
                <button onclick="closeModal()" class="text-slate-300 text-2xl"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modalContent" class="space-y-4"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around py-3 z-40">
        <button onclick="nav('record')" id="nav-record" class="flex flex-col items-center text-slate-300 active-tab"><i class="fas fa-edit"></i><span class="text-[10px] mt-1 font-bold">紀錄</span></button>
        <button onclick="nav('trend')" id="nav-trend" class="flex flex-col items-center text-slate-300"><i class="fas fa-chart-line"></i><span class="text-[10px] mt-1 font-bold">趨勢</span></button>
        <button onclick="nav('settings')" id="nav-settings" class="flex flex-col items-center text-slate-300"><i class="fas fa-users"></i><span class="text-[10px] mt-1 font-bold">管理</span></button>
    </nav>

    <script>
        let members = JSON.parse(localStorage.getItem('health_members_v4') || '["爸爸", "媽媽"]');
        let currentMember = members[0];
        let activeDate = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('health_db_v4') || '{}');
        let currentType = 'bp';
        let charts = {};

        function init() {
            document.getElementById('globalMonth').value = activeDate.substring(0, 7);
            updateAllViews();
        }

        function nav(page) {
            ['record', 'trend', 'settings'].forEach(p => {
                document.getElementById(p + 'Page').classList.add('hidden');
                document.getElementById('nav-' + p).classList.remove('active-tab');
            });
            document.getElementById(page + 'Page').classList.remove('hidden');
            document.getElementById('nav-' + page).classList.add('active-tab');
            document.getElementById('pageTitle').innerText = page === 'record' ? '健康紀錄' : page === 'trend' ? '月度趨勢' : '系統管理';
            if(page === 'trend') renderCharts();
            if(page === 'settings') renderMemberList();
        }

        function switchType(type) {
            currentType = type;
            document.getElementById('bpInput').classList.toggle('hidden', type !== 'bp');
            document.getElementById('bsInput').classList.toggle('hidden', type !== 'bs');
            document.getElementById('bpBtn').className = type === 'bp' ? 'flex-1 py-1.5 text-xs rounded-lg bg-white shadow-sm font-bold text-emerald-600' : 'flex-1 py-1.5 text-xs rounded-lg text-slate-400';
            document.getElementById('bsBtn').className = type === 'bs' ? 'flex-1 py-1.5 text-xs rounded-lg bg-white shadow-sm font-bold text-emerald-600' : 'flex-1 py-1.5 text-xs rounded-lg text-slate-400';
        }

        function getAIAdvice(r) {
            if(r.type === 'bp') {
                const s = parseInt(r.sys), d = parseInt(r.dia);
                if(s >= 140 || d >= 90) return { status: '危險', color: 'text-red-500', bg: 'bg-red-50', advice: '血壓偏高，請減少鹽分攝取並定期追蹤。' };
                if(s >= 130 || d >= 85) return { status: '注意', color: 'text-amber-500', bg: 'bg-amber-50', advice: '血壓稍微波動，請多休息，保持心情平穩。' };
                return { status: '正常', color: 'text-emerald-500', bg: 'bg-emerald-50', advice: '血壓正常，請繼續保持良好的生活習慣。' };
            } else {
                const g = parseInt(r.glucose);
                if(r.period === '空腹' && g > 126) return { status: '偏高', color: 'text-red-500', bg: 'bg-red-50', advice: '空腹血糖異常，請留意澱粉與糖分攝取。' };
                return { status: '正常', color: 'text-emerald-500', bg: 'bg-emerald-50', advice: '血糖數值目前控制穩定。' };
            }
        }

        function updateAllViews() {
            renderMemberTabs();
            renderCalendar();
        }

        function renderCalendar() {
            const monthVal = document.getElementById('globalMonth').value;
            const [y, m] = monthVal.split('-').map(Number);
            const firstDay = new Date(y, m-1, 1).getDay();
            const daysInMonth = new Date(y, m, 0).getDate();
            const container = document.getElementById('calendarGrid');
            container.innerHTML = '';
            for(let i=0; i<firstDay; i++) container.innerHTML += '<div></div>';
            const monthData = (db[monthVal] && db[monthVal][currentMember]) ? db[monthVal][currentMember] : [];
            for(let d=1; d<=daysInMonth; d++) {
                const fullDate = `${monthVal}-${String(d).padStart(2, '0')}`;
                const entries = monthData.filter(r => r.date === fullDate);
                const isSelected = fullDate === activeDate;
                container.innerHTML += `
                    <div onclick="selectDate('${fullDate}', ${entries.length > 0})" class="day-cell p-2 rounded-xl cursor-pointer ${isSelected?'bg-emerald-500 text-white font-black':'text-slate-500 hover:bg-slate-100'}">
                        <span>${d}</span>
                        ${entries.length > 0 ? `<div class="w-1.5 h-1.5 ${isSelected?'bg-white':'bg-emerald-400'} rounded-full mx-auto mt-1"></div>` : ''}
                    </div>
                `;
            }
        }

        function selectDate(date, hasData) {
            activeDate = date;
            document.getElementById('targetDate').innerText = (date === new Date().toISOString().split('T')[0]) ? '今日' : date;
            renderCalendar();
            if(hasData) openModal(date);
        }

        function openModal(date) {
            const monthKey = date.substring(0, 7);
            const data = db[monthKey][currentMember].filter(r => r.date === date);
            document.getElementById('modalDate').innerText = `${date} 量測明細`;
            document.getElementById('modalContent').innerHTML = data.map((r, idx) => {
                const ai = getAIAdvice(r);
                return `
                    <div class="p-4 rounded-2xl border border-slate-100 bg-white shadow-sm space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400"><i class="far fa-clock mr-1"></i>${r.time}</span>
                            <span class="text-[10px] font-black ${ai.color} ${ai.bg} px-2 py-0.5 rounded-full">${ai.status}</span>
                        </div>
                        <div class="text-lg font-bold text-slate-700">${r.type==='bp' ? `血壓 ${r.sys}/${r.dia} <small class="text-[10px] font-normal">mmHg</small> · 心跳 ${r.pulse}` : `血糖 ${r.glucose} <small class="text-[10px] font-normal">mg/dL (${r.period})</small>`}</div>
                        <div class="text-[11px] ${ai.color} leading-relaxed bg-slate-50 p-2 rounded-xl border-l-4 border-current">AI 建議：${ai.advice}</div>
                        <button onclick="deleteRecord('${date}', ${idx})" class="text-[10px] text-slate-300 hover:text-red-400 pt-1">刪除此紀錄</button>
                    </div>
                `;
            }).join('');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function deleteRecord(date, index) {
            if(!confirm("確定要刪除這筆紀錄嗎？")) return;
            const monthKey = date.substring(0, 7);
            const allDateRecords = db[monthKey][currentMember].filter(r => r.date === date);
            const targetRecord = allDateRecords[index];
            db[monthKey][currentMember] = db[monthKey][currentMember].filter(r => r !== targetRecord);
            localStorage.setItem('health_db_v4', JSON.stringify(db));
            closeModal();
            updateAllViews();
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

        function renderCharts() {
            const monthKey = document.getElementById('globalMonth').value;
            const data = (db[monthKey] && db[monthKey][currentMember]) ? db[monthKey][currentMember] : [];
            const labels = [...new Set(data.map(r => r.date.split('-')[2]))].sort();
            const createChart = (id, label, rawData, color) => {
                const ctx = document.getElementById(id).getContext('2d');
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels.map(l => l + '日'),
                        datasets: [{ label, data: rawData, borderColor: color, backgroundColor: color+'22', tension: 0.3, fill: true, pointRadius: 4 }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            };
            const bpData = labels.map(day => {
                const d = data.filter(r => r.date.endsWith(day) && r.type==='bp');
                return d.length ? d[d.length-1].sys : null;
            });
            const bsData = labels.map(day => {
                const d = data.filter(r => r.date.endsWith(day) && r.type==='bs');
                return d.length ? d[d.length-1].glucose : null;
            });
            createChart('bpChart', '收縮壓', bpData, '#10b981');
            createChart('bsChart', '血糖', bsData, '#3b82f6');
        }

        function saveData() {
            const time = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
            let entry = { time, type: currentType, date: activeDate };
            if(currentType === 'bp') {
                entry.sys = document.getElementById('sys').value;
                entry.dia = document.getElementById('dia').value;
                entry.pulse = document.getElementById('pulse').value;
                if(!entry.sys || !entry.dia) return alert("請輸入血壓數值");
            } else {
                entry.glucose = document.getElementById('glucose').value;
                entry.period = document.getElementById('bsPeriod').value;
                if(!entry.glucose) return alert("請輸入血糖數值");
            }
            const monthKey = activeDate.substring(0, 7);
            if(!db[monthKey]) db[monthKey] = {};
            if(!db[monthKey][currentMember]) db[monthKey][currentMember] = [];
            db[monthKey][currentMember].push(entry);
            localStorage.setItem('health_db_v4', JSON.stringify(db));
            alert("✅ 紀錄已儲存");
            updateAllViews();
            // 清空輸入
            ['sys','dia','pulse','glucose'].forEach(id => document.getElementById(id).value = '');
        }

        function renderMemberTabs() {
            const container = document.getElementById('memberTabs');
            container.innerHTML = members.map(m => `
                <button onclick="currentMember='${m}';updateAllViews()" class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-bold transition ${currentMember === m ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-400 border border-slate-100'}">${m}</button>
            `).join('');
        }

        function renderMemberList() {
            const list = document.getElementById('memberList');
            list.innerHTML = members.map((m, i) => `<div class="flex justify-between bg-slate-50 p-3 rounded-xl items-center"><span class="font-bold text-slate-600">${m}</span><button onclick="deleteMember(${i})" class="text-red-400 text-xs font-bold bg-white px-3 py-1 rounded-lg border border-red-50">刪除</button></div>`).join('');
        }

        function deleteMember(idx) {
            if(members.length <= 1) return alert("至少需保留一位成員");
            if(confirm(`確定要刪除成員 ${members[idx]} 嗎？其相關數據仍會保留在數據庫中。`)) {
                members.splice(idx, 1);
                currentMember = members[0];
                localStorage.setItem('health_members_v4', JSON.stringify(members));
                renderMemberList();
                updateAllViews();
            }
        }

        function addMember() {
            const n = document.getElementById('newMemberName').value.trim();
            if(n) { 
                members.push(n); 
                localStorage.setItem('health_members_v4', JSON.stringify(members)); 
                document.getElementById('newMemberName').value=''; 
                renderMemberList(); 
                renderMemberTabs(); 
            }
        }

        function sendToLine() {
            const monthKey = document.getElementById('globalMonth').value;
            const data = (db[monthKey] && db[monthKey][currentMember]) ? db[monthKey][currentMember] : [];
            if (data.length === 0) return alert('本月無紀錄可傳送');
            let message = `📊 【${currentMember}】${monthKey} 量測週報\n`;
            const recent = data.slice(-8); // 取最後8筆
            recent.forEach(r => {
                message += `\n📅 ${r.date.split('-')[2]}日 ${r.time}\n   ${r.type==='bp'?`血壓:${r.sys}/${r.dia} (心跳:${r.pulse})`:`血糖:${r.glucose} (${r.period})`}\n`;
            });
            message += `\n------------------\n守護家人健康\n© A de Porchetta`;
            window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
        }

        function exportCSV() {
            const monthKey = document.getElementById('globalMonth').value;
            const data = db[monthKey]?.[currentMember] || [];
            if(!data.length) return alert("無資料可匯出");
            let csv = "日期,時間,項目,數值1,數值2,心跳/類別\n" + data.map(r => `${r.date},${r.time},${r.type==='bp'?'血壓':'血糖'},${r.sys||r.glucose},${r.dia||''},${r.pulse||r.period}`).join("\n");
            const blob = new Blob(["\ufeff"+csv], {type:'text/csv'});
            const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`健康報表_${currentMember}_${monthKey}.csv`; a.click();
        }

        function backupJSON() {
            const dataStr = JSON.stringify({db, members});
            const blob = new Blob([dataStr], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `健康數據備份_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        init();
    </script>
</body>
</html>
